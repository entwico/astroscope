<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Restarting…</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font:
          14px system-ui,
          sans-serif;
        background: #0b0d10;
        color: #a8b1bd;
      }

      .center {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        flex-direction: column;
        gap: 12px;
        padding: 0 24px;
        box-sizing: border-box;
      }

      .message {
        font-size: 18px;
      }

      .error-title {
        color: #ff6b6b;
        font-size: 18px;
        font-weight: 600;
      }

      .error-body {
        max-width: 800px;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        background: #15181d;
        border: 1px solid #2a2f37;
        border-radius: 6px;
        padding: 12px 16px;
        overflow: auto;
        max-height: 60vh;
      }

      .hint {
        color: #6b7480;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="root" class="center">
      <p class="message">Reloading dev server…</p>
    </div>

    <script>
      const root = document.getElementById('root');
      const url = new URL(location.href);

      function showError(message) {
        document.title = 'Boot failed';
        root.innerHTML = '';

        const title = document.createElement('p');
        title.className = 'error-title';
        title.textContent = 'Boot failed';

        const body = document.createElement('pre');
        body.className = 'error-body';
        body.textContent = message;

        const hint = document.createElement('p');
        hint.className = 'hint';
        hint.textContent = 'Fix the error and save — this page will reload automatically.';

        root.append(title, body, hint);
      }

      (async () => {
        for (;;) {
          try {
            const r = await fetch('/__astroscope_boot_ready', { cache: 'no-store' });

            if (r.ok) {
              location.replace(url.toString());
              return;
            }

            if (r.status === 503) {
              const { error } = await r.json().catch(() => ({ error: 'Unknown error' }));
              showError(error);
            }
          } catch {}

          await new Promise((r) => setTimeout(r, 100));
        }
      })();
    </script>
  </body>
</html>
